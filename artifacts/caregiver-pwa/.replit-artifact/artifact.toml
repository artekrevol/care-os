kind = "web"
previewPath = "/m/"
title = "CareOS Caregiver"
version = "1.0.0"
id = "artifacts/caregiver-pwa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/m/" ]
localPort = 18422

[services.development]
run = "pnpm --filter @workspace/caregiver-pwa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/caregiver-pwa", "run", "build" ]
publicDir = "artifacts/caregiver-pwa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18422"
BASE_PATH = "/m/"
