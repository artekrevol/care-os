kind = "web"
previewPath = "/family/"
title = "CareOS Family Portal"
version = "1.0.0"
id = "artifacts/family-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/family/" ]
localPort = 21870

[services.development]
run = "pnpm --filter @workspace/family-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-portal", "run", "build" ]
publicDir = "artifacts/family-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21870"
BASE_PATH = "/family/"
