openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CareOS API — home care operating system foundation.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: clients
  - name: authorizations
  - name: caregivers
  - name: documents
  - name: schedules
  - name: visits
  - name: payroll
  - name: rules
  - name: alerts
  - name: audit
  - name: care-plans
  - name: visit-artifacts
  - name: family
  - name: messaging
  - name: notifications
  - name: agent-runs
  - name: intelligence
  - name: referrals
  - name: reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Operational dashboard summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/ot-projection:
    get:
      operationId: getOvertimeProjection
      tags: [dashboard, payroll]
      summary: Live overtime projection for the open pay period
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OvertimeProjection"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ClientStatus"
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
