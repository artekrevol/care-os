openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CareOS API — home care operating system foundation.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: clients
  - name: authorizations
  - name: caregivers
  - name: documents
  - name: schedules
  - name: visits
  - name: payroll
  - name: rules
  - name: alerts
  - name: audit
  - name: care-plans
  - name: visit-artifacts
  - name: family
  - name: messaging
  - name: notifications
  - name: agent-runs
  - name: intelligence
  - name: referrals
  - name: reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Operational dashboard summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/ot-projection:
    get:
      operationId: getOvertimeProjection
      tags: [dashboard, payroll]
      summary: Live overtime projection for the open pay period
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OvertimeProjection"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ClientStatus"
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
    patch:
      operationId: updateClient
      tags: [clients]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}/authorizations:
    get:
      operationId: listClientAuthorizations
      tags: [authorizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Authorization"
    post:
      operationId: createClientAuthorization
      tags: [authorizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuthorizationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Authorization"

  /authorizations/expiring:
    get:
      operationId: listExpiringAuthorizations
      tags: [authorizations]
      summary: Authorizations expiring or exhausted soon
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Authorization"

  /caregivers:
    get:
      operationId: listCaregivers
      tags: [caregivers]
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Caregiver"
    post:
      operationId: createCaregiver
      tags: [caregivers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaregiverBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caregiver"

  /caregivers/{id}:
    get:
      operationId: getCaregiver
      tags: [caregivers]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverDetail"
    patch:
      operationId: updateCaregiver
      tags: [caregivers]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaregiverBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Caregiver"

  /caregivers/{id}/documents:
    get:
      operationId: listCaregiverDocuments
      tags: [documents]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaregiverDocument"
    post:
      operationId: createCaregiverDocument
      tags: [documents]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaregiverDocumentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverDocument"

  /documents/expiring:
    get:
      operationId: listExpiringDocuments
      tags: [documents]
      summary: Caregiver documents expiring soon
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaregiverDocument"

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: caregiverId
          schema:
            type: string
        - in: query
          name: clientId
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleCreateResult"

  /schedules/dry-run:
    post:
      operationId: dryRunSchedule
      tags: [schedules]
      summary: Validate a proposed shift and project OT impact without persisting.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleDryRunBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleDryRunResult"

  /schedules/suggest-caregivers:
    post:
      operationId: suggestCaregivers
      tags: [schedules]
      summary: Schedule Optimizer Agent — top 5 caregivers ranked by compatibility.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestCaregiversBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaregiverSuggestionList"

  /schedules/{id}:
    patch:
      operationId: updateSchedule
      tags: [schedules]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleCreateResult"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /visits:
    get:
      operationId: listVisits
      tags: [visits]
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/VisitVerificationStatus"
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Visit"

  /visits/clock-in:
    post:
      operationId: clockIn
      tags: [visits]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockInBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"

  /visits/{id}/clock-out:
    post:
      operationId: clockOut
      tags: [visits]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOutBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"

  /visits/{id}/verify:
    post:
      operationId: verifyVisit
      tags: [visits]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyVisitBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"

  /pay-periods:
    get:
      operationId: listPayPeriods
      tags: [payroll]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayPeriod"

  /pay-periods/{id}:
    get:
      operationId: getPayPeriod
      tags: [payroll]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayPeriodDetail"

  /pay-periods/{id}/close:
    post:
      operationId: closePayPeriod
      tags: [payroll]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayPeriod"

  /pay-periods/{id}/export:
    get:
      operationId: exportPayPeriodCsv
      tags: [payroll]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ADP-compatible CSV
          content:
            text/csv:
              schema:
                type: string

  /labor-rules:
    get:
      operationId: listLaborRules
      tags: [rules]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LaborRuleSet"

  /labor-rules/active:
    get:
      operationId: getActiveLaborRule
      tags: [rules]
      summary: Currently active labor rule for the agency
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaborRuleSet"
    post:
      operationId: setActiveLaborRule
      tags: [rules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetActiveLaborRuleBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaborRuleSet"

  /alerts:
    get:
      operationId: listComplianceAlerts
      tags: [alerts]
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ComplianceAlertStatus"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceAlert"

  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceAlert"

  /alerts/{id}/resolve:
    post:
      operationId: resolveAlert
      tags: [alerts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceAlert"

  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit]
      parameters:
        - in: query
          name: entityType
          schema:
            type: string
        - in: query
          name: entityId
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

  /care-plans:
    get:
      operationId: listCarePlans
      tags: [care-plans]
      parameters:
        - in: query
          name: clientId
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/CarePlanStatus"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CarePlan"
    post:
      operationId: createCarePlan
      tags: [care-plans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarePlanBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlan"

  /care-plans/{id}:
    get:
      operationId: getCarePlan
      tags: [care-plans]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlan"
    patch:
      operationId: updateCarePlan
      tags: [care-plans]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCarePlanBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlan"

  /care-plans/{id}/submit:
    post:
      operationId: submitCarePlan
      tags: [care-plans]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitCarePlanBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlan"

  /care-plans/{id}/approve:
    post:
      operationId: approveCarePlan
      tags: [care-plans]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveCarePlanBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlan"

  /care-plans/{id}/reject:
    post:
      operationId: rejectCarePlan
      tags: [care-plans]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectCarePlanBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlan"

  /care-plans/{id}/acknowledge:
    post:
      operationId: acknowledgeCarePlan
      tags: [care-plans, family]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeCarePlanBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlanAcknowledgment"

  /clients/{id}/care-plans:
    get:
      operationId: listClientCarePlans
      tags: [care-plans]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CarePlan"

  /clients/{id}/care-plan/active:
    get:
      operationId: getActiveCarePlan
      tags: [care-plans]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlan"
        "404":
          description: No active care plan

  /clients/{id}/care-plans/generate:
    post:
      operationId: generateCarePlanFromAuthorization
      tags: [care-plans]
      summary: AI drafter — propose a starter plan from authorization scope
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCarePlanFromAuthorizationBody"
      responses:
        "201":
          description: Drafted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlan"

  /task-templates:
    get:
      operationId: listTaskTemplates
      tags: [care-plans]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskTemplate"

  /family/pending-acknowledgments:
    get:
      operationId: listPendingFamilyAcknowledgments
      tags: [care-plans, family]
      parameters:
        - in: query
          name: familyUserId
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingFamilyAcknowledgment"

  /visits/{id}/checklist:
    get:
      operationId: getVisitChecklist
      tags: [visit-artifacts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitChecklistInstance"

  /visits/{id}/checklist/tasks/{taskId}/complete:
    post:
      operationId: completeVisitChecklistTask
      tags: [visit-artifacts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteVisitChecklistTaskBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitChecklistInstance"

  /visits/{id}/checklist/tasks/{taskId}/skip:
    post:
      operationId: skipVisitChecklistTask
      tags: [visit-artifacts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkipVisitChecklistTaskBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitChecklistInstance"

  /visits/{id}/notes:
    get:
      operationId: listVisitNotes
      tags: [visit-artifacts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisitNote"
    post:
      operationId: createVisitNote
      tags: [visit-artifacts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVisitNoteBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitNote"

  /visits/{id}/incidents:
    get:
      operationId: listVisitIncidents
      tags: [visit-artifacts]
      parameters:
        - in: path
          name: id
          required: true
