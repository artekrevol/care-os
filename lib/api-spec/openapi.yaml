components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ClientStatus:
      type: string
      enum: [PROSPECT, ACTIVE, ON_HOLD, DISCHARGED]

    PayerType:
      type: string
      enum: [PRIVATE_PAY, VA_CCN, MEDICAID_HCBS, COUNTY_IHSS, LTC_INSURANCE]

    Client:
      type: object
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        dob: { type: string, format: date }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        addressLine1: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        postalCode: { type: string, nullable: true }
        primaryPayer:
          $ref: "#/components/schemas/PayerType"
        status:
          $ref: "#/components/schemas/ClientStatus"
        intakeDate: { type: string, format: date, nullable: true }
        languages:
          type: array
          items: { type: string }
        carePreferences: { type: string, nullable: true }
        allergies: { type: string, nullable: true }
        emergencyContactName: { type: string, nullable: true }
        emergencyContactPhone: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required:
        [id, firstName, lastName, dob, primaryPayer, status, languages, createdAt]

    ClientDetail:
      allOf:
        - $ref: "#/components/schemas/Client"
        - type: object
          properties:
            authorizations:
              type: array
              items:
                $ref: "#/components/schemas/Authorization"
            recentVisits:
              type: array
              items:
                $ref: "#/components/schemas/Visit"
          required: [authorizations, recentVisits]

    CreateClientBody:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        dob: { type: string, format: date }
        phone: { type: string }
        email: { type: string }
        addressLine1: { type: string }
        city: { type: string }
        state: { type: string }
        postalCode: { type: string }
        primaryPayer:
          $ref: "#/components/schemas/PayerType"
        languages:
          type: array
          items: { type: string }
        carePreferences: { type: string }
        allergies: { type: string }
        emergencyContactName: { type: string }
        emergencyContactPhone: { type: string }
      required: [firstName, lastName, dob, primaryPayer]

    UpdateClientBody:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
        email: { type: string }
        addressLine1: { type: string }
        city: { type: string }
        state: { type: string }
        postalCode: { type: string }
        status:
          $ref: "#/components/schemas/ClientStatus"
        primaryPayer:
          $ref: "#/components/schemas/PayerType"
        carePreferences: { type: string }
        allergies: { type: string }
        emergencyContactName: { type: string }
        emergencyContactPhone: { type: string }

    AuthorizationStatus:
      type: string
      enum: [ACTIVE, EXPIRING_SOON, EXPIRED, EXHAUSTED]

    Authorization:
      type: object
      properties:
        id: { type: string }
        clientId: { type: string }
        clientName: { type: string }
        payer:
          $ref: "#/components/schemas/PayerType"
        authNumber: { type: string }
        issuedDate: { type: string, format: date }
        expirationDate: { type: string, format: date }
        approvedHoursPerWeek: { type: number }
        approvedHoursTotal: { type: number }
        hoursUsed: { type: number }
        hoursRemaining: { type: number }
        scopeOfCare:
          type: array
          items: { type: string }
        status:
          $ref: "#/components/schemas/AuthorizationStatus"
        daysUntilExpiration: { type: integer }
      required:
        [
          id,
          clientId,
          clientName,
          payer,
          authNumber,
          issuedDate,
          expirationDate,
          approvedHoursPerWeek,
          approvedHoursTotal,
          hoursUsed,
          hoursRemaining,
          scopeOfCare,
          status,
          daysUntilExpiration,
        ]

    CreateAuthorizationBody:
      type: object
      properties:
        payer:
          $ref: "#/components/schemas/PayerType"
        authNumber: { type: string }
        issuedDate: { type: string, format: date }
        expirationDate: { type: string, format: date }
        approvedHoursPerWeek: { type: number }
        approvedHoursTotal: { type: number }
        scopeOfCare:
          type: array
          items: { type: string }
      required:
        [
          payer,
          authNumber,
          issuedDate,
          expirationDate,
          approvedHoursPerWeek,
          approvedHoursTotal,
        ]

    EmploymentType:
      type: string
      enum: [W2, "1099"]

    CaregiverStatus:
      type: string
      enum: [ACTIVE, INACTIVE, TERMINATED]

    Caregiver:
      type: object
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        hireDate: { type: string, format: date, nullable: true }
        status:
          $ref: "#/components/schemas/CaregiverStatus"
        languages:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { type: string }
        payRate: { type: number }
        hasVehicle: { type: boolean }
        addressCity: { type: string, nullable: true }
        addressState: { type: string, nullable: true }
        documentsValid: { type: integer }
        documentsExpiring: { type: integer }
        documentsExpired: { type: integer }
        createdAt: { type: string, format: date-time }
      required:
        [
          id,
          firstName,
          lastName,
          employmentType,
          status,
          languages,
          skills,
          payRate,
          hasVehicle,
          documentsValid,
          documentsExpiring,
          documentsExpired,
          createdAt,
        ]

    CaregiverDetail:
      allOf:
        - $ref: "#/components/schemas/Caregiver"
        - type: object
          properties:
            documents:
              type: array
              items:
                $ref: "#/components/schemas/CaregiverDocument"
            recentVisits:
              type: array
              items:
                $ref: "#/components/schemas/Visit"
          required: [documents, recentVisits]

    CreateCaregiverBody:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        phone: { type: string }
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        hireDate: { type: string, format: date }
        languages:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { type: string }
        payRate: { type: number }
        hasVehicle: { type: boolean }
        addressCity: { type: string }
        addressState: { type: string }
      required: [firstName, lastName, employmentType, payRate]

    UpdateCaregiverBody:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        phone: { type: string }
        status:
          $ref: "#/components/schemas/CaregiverStatus"
        payRate: { type: number }
        hasVehicle: { type: boolean }
        languages:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { type: string }

    DocumentType:
      type: string
      enum:
        [
          BACKGROUND_CHECK,
          TB_TEST,
          CPR,
          TRAINING,
          LICENSE,
          I9,
          W4,
          DIRECT_DEPOSIT,
          CARE_AGREEMENT,
          INCIDENT_REPORT,
          AUTHORIZATION,
          MEDICAL_RECORD,
          OTHER,
        ]

    ClassificationStatus:
      type: string
      enum: [NONE, PENDING, RUNNING, DONE, FAILED]

    DocumentStatus:
      type: string
      enum: [VALID, EXPIRING, EXPIRED, MISSING]

    CaregiverDocument:
      type: object
      properties:
        id: { type: string }
        caregiverId: { type: string }
        caregiverName: { type: string }
        documentType:
          $ref: "#/components/schemas/DocumentType"
        issuedDate: { type: string, format: date, nullable: true }
        expirationDate: { type: string, format: date, nullable: true }
        status:
          $ref: "#/components/schemas/DocumentStatus"
        daysUntilExpiration: { type: integer, nullable: true }
        fileUrl: { type: string, nullable: true }
        originalFilename: { type: string, nullable: true }
        classificationStatus:
          $ref: "#/components/schemas/ClassificationStatus"
        classifiedType:
          allOf:
            - $ref: "#/components/schemas/DocumentType"
          nullable: true
        classificationConfidence: { type: number, nullable: true }
        needsReview: { type: boolean }
        agentRunId: { type: string, nullable: true }
      required:
        [
          id,
          caregiverId,
          caregiverName,
          documentType,
          status,
          classificationStatus,
          needsReview,
        ]

    CreateCaregiverDocumentBody:
      type: object
      properties:
        documentType:
          $ref: "#/components/schemas/DocumentType"
        issuedDate: { type: string, format: date }
        expirationDate: { type: string, format: date }
        fileUrl: { type: string }
      required: [documentType]

    ScheduleStatus:
      type: string
      enum: [SCHEDULED, IN_PROGRESS, COMPLETED, MISSED, CANCELLED]

    Schedule:
      type: object
      properties:
        id: { type: string }
        clientId: { type: string }
        clientName: { type: string }
        caregiverId: { type: string }
        caregiverName: { type: string }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        scheduledMinutes: { type: integer }
        serviceCode: { type: string }
        serviceDescription: { type: string }
        authorizationId: { type: string, nullable: true }
        status:
          $ref: "#/components/schemas/ScheduleStatus"
        notes: { type: string, nullable: true }
      required:
        [
          id,
          clientId,
          clientName,
          caregiverId,
          caregiverName,
          startTime,
          endTime,
          scheduledMinutes,
          serviceCode,
          serviceDescription,
          status,
        ]

    CreateScheduleBody:
      type: object
      properties:
        clientId: { type: string }
        caregiverId: { type: string }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        serviceCode: { type: string }
        serviceDescription: { type: string }
        authorizationId: { type: string }
        notes: { type: string }
      required: [clientId, caregiverId, startTime, endTime, serviceCode]

    UpdateScheduleBody:
      type: object
      properties:
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        caregiverId: { type: string }
        status:
          $ref: "#/components/schemas/ScheduleStatus"
        notes: { type: string }

    ScheduleConflict:
      type: object
      properties:
        type:
          type: string
          enum:
            [
              DOUBLE_BOOK,
              EXPIRED_CREDENTIAL,
              AUTH_OVERRUN,
              AUTH_EXPIRED,
              OT_THRESHOLD,
              OUTSIDE_AUTH_HOURS,
              DRIVE_TIME_IMPOSSIBLE,
            ]
        message: { type: string }
        severity:
          type: string
          enum: [WARNING, BLOCK]
      required: [type, message, severity]

    ScheduleCreateResult:
      type: object
      properties:
        schedule:
          $ref: "#/components/schemas/Schedule"
          nullable: true
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleConflict"
        blocked: { type: boolean }
      required: [conflicts, blocked]

    OtImpact:
      type: object
      properties:
        currentRegularMinutes: { type: integer }
        currentOvertimeMinutes: { type: integer }
        currentDoubleTimeMinutes: { type: integer }
        projectedRegularMinutes: { type: integer }
        projectedOvertimeMinutes: { type: integer }
        projectedDoubleTimeMinutes: { type: integer }
        deltaOvertimeMinutes: { type: integer }
        deltaDoubleTimeMinutes: { type: integer }
        deltaCostUsd: { type: number }
        weeklyThresholdMinutes: { type: integer, nullable: true }
        dailyThresholdMinutes: { type: integer, nullable: true }
      required:
        [
          currentRegularMinutes,
          currentOvertimeMinutes,
          currentDoubleTimeMinutes,
          projectedRegularMinutes,
          projectedOvertimeMinutes,
          projectedDoubleTimeMinutes,
          deltaOvertimeMinutes,
          deltaDoubleTimeMinutes,
          deltaCostUsd,
        ]

    ScheduleDryRunBody:
      type: object
      properties:
        scheduleId: { type: string }
        clientId: { type: string }
        caregiverId: { type: string }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
      required: [clientId, caregiverId, startTime, endTime]

    ScheduleDryRunResult:
      type: object
      properties:
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleConflict"
        blocked: { type: boolean }
        otImpact:
          $ref: "#/components/schemas/OtImpact"
      required: [conflicts, blocked, otImpact]

    CompatibilityFactors:
      type: object
      properties:
        skillScore: { type: number }
        languageScore: { type: number }
        driveScore: { type: number }
        continuityScore: { type: number }
        availabilityScore: { type: number }
        otSafeScore: { type: number }
        skillMatches:
          type: array
          items: { type: string }
        languageMatches:
          type: array
          items: { type: string }
        driveMinutes: { type: number, nullable: true }
        priorVisitsWithClient: { type: integer }
        weeklyHeadroomMinutes: { type: integer }
      required:
        [
          skillScore,
          languageScore,
          driveScore,
          continuityScore,
          availabilityScore,
          otSafeScore,
          skillMatches,
          languageMatches,
          priorVisitsWithClient,
          weeklyHeadroomMinutes,
        ]

    CaregiverSuggestion:
      type: object
      properties:
        caregiverId: { type: string }
        caregiverName: { type: string }
        score: { type: number }
        rank: { type: integer }
        factors:
          $ref: "#/components/schemas/CompatibilityFactors"
        reasoning: { type: string, nullable: true }
        blockingConflicts:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleConflict"
      required:
        [caregiverId, caregiverName, score, rank, factors, blockingConflicts]

    SuggestCaregiversBody:
      type: object
      properties:
        scheduleId: { type: string }
        clientId: { type: string }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
      required: [clientId, startTime, endTime]

    CaregiverSuggestionList:
      type: object
      properties:
        agentRunId: { type: string, nullable: true }
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/CaregiverSuggestion"
      required: [suggestions]

    VisitVerificationStatus:
      type: string
      enum: [PENDING, VERIFIED, EXCEPTION, REJECTED]

    ClockMethod:
      type: string
      enum: [GPS, TELEPHONY, FOB, MANUAL]

    Visit:
      type: object
      properties:
        id: { type: string }
        scheduleId: { type: string, nullable: true }
        caregiverId: { type: string }
        caregiverName: { type: string }
        clientId: { type: string }
        clientName: { type: string }
        clockInTime: { type: string, format: date-time, nullable: true }
        clockInLat: { type: number, nullable: true }
        clockInLng: { type: number, nullable: true }
        clockInMethod:
          $ref: "#/components/schemas/ClockMethod"
        clockOutTime: { type: string, format: date-time, nullable: true }
        clockOutLat: { type: number, nullable: true }
        clockOutLng: { type: number, nullable: true }
        clockOutMethod:
          $ref: "#/components/schemas/ClockMethod"
        durationMinutes: { type: integer, nullable: true }
        tasksCompleted:
          type: array
          items: { type: string }
        caregiverNotes: { type: string, nullable: true }
        supervisorNotes: { type: string, nullable: true }
        verificationStatus:
          $ref: "#/components/schemas/VisitVerificationStatus"
        exceptionReason: { type: string, nullable: true }
        geoFenceMatch: { type: boolean }
        hasIncident: { type: boolean }
        clientSignatureId: { type: string, nullable: true }
      required:
        [
          id,
          caregiverId,
          caregiverName,
          clientId,
          clientName,
          clockInMethod,
          clockOutMethod,
          tasksCompleted,
          verificationStatus,
          hasIncident,
          geoFenceMatch,
        ]

    ClockInBody:
      type: object
      properties:
        scheduleId: { type: string }
        caregiverId: { type: string }
        clientId: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        method:
          $ref: "#/components/schemas/ClockMethod"
        occurredAt:
          type: string
          format: date-time
          description: |
            Original event timestamp captured on device. When supplied (e.g.
            replayed from the offline queue), the server uses this for
            `clockInTime` and stamps `offlineSyncedAt`.
      required: [caregiverId, clientId, method]

    ClockOutBody:
      type: object
      properties:
        latitude: { type: number }
        longitude: { type: number }
        method:
          $ref: "#/components/schemas/ClockMethod"
        tasksCompleted:
          type: array
          items: { type: string }
        caregiverNotes: { type: string }
        occurredAt:
          type: string
          format: date-time
          description: |
            Original event timestamp captured on device. When supplied (e.g.
            replayed from the offline queue), the server uses this for
            `clockOutTime` and stamps `offlineSyncedAt`.
      required: [method]

    VerifyVisitBody:
      type: object
      properties:
        decision:
          type: string
          enum: [VERIFIED, REJECTED]
        supervisorNotes: { type: string }
      required: [decision]

    PayPeriodStatus:
      type: string
      enum: [OPEN, CLOSED, EXPORTED, PAID]

    PayPeriod:
      type: object
      properties:
        id: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status:
          $ref: "#/components/schemas/PayPeriodStatus"
        totalRegularHours: { type: number }
        totalOvertimeHours: { type: number }
        totalDoubleTimeHours: { type: number }
        totalGrossPay: { type: number }
        caregiverCount: { type: integer }
        exportedAt: { type: string, format: date-time, nullable: true }
      required:
        [
          id,
          startDate,
          endDate,
          status,
          totalRegularHours,
          totalOvertimeHours,
          totalDoubleTimeHours,
          totalGrossPay,
          caregiverCount,
        ]

    TimeEntry:
      type: object
      properties:
        id: { type: string }
        caregiverId: { type: string }
        caregiverName: { type: string }
        visitId: { type: string }
        workDate: { type: string, format: date }
        regularMinutes: { type: integer }
        overtimeMinutes: { type: integer }
        doubleTimeMinutes: { type: integer }
        payRate: { type: number }
        regularPay: { type: number }
        overtimePay: { type: number }
        doubleTimePay: { type: number }
        totalPay: { type: number }
        ruleEngineVersion: { type: string }
      required:
        [
          id,
          caregiverId,
          caregiverName,
          visitId,
          workDate,
          regularMinutes,
          overtimeMinutes,
          doubleTimeMinutes,
          payRate,
          regularPay,
          overtimePay,
          doubleTimePay,
          totalPay,
          ruleEngineVersion,
        ]

    PayPeriodDetail:
      allOf:
        - $ref: "#/components/schemas/PayPeriod"
        - type: object
          properties:
            entries:
              type: array
              items:
                $ref: "#/components/schemas/TimeEntry"
            byCaregiver:
              type: array
              items:
                $ref: "#/components/schemas/CaregiverPayrollSummary"
          required: [entries, byCaregiver]

    CaregiverPayrollSummary:
      type: object
      properties:
        caregiverId: { type: string }
        caregiverName: { type: string }
        regularMinutes: { type: integer }
        overtimeMinutes: { type: integer }
        doubleTimeMinutes: { type: integer }
        regularPay: { type: number }
        overtimePay: { type: number }
        doubleTimePay: { type: number }
        totalPay: { type: number }
      required:
        [
          caregiverId,
          caregiverName,
          regularMinutes,
          overtimeMinutes,
          doubleTimeMinutes,
          regularPay,
          overtimePay,
          doubleTimePay,
          totalPay,
        ]

    LaborRuleSet:
      type: object
      properties:
        id: { type: string }
        state: { type: string }
        name: { type: string }
